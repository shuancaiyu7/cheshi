# 电商数据爬虫 + 可视化看板项目配置
# 数据库配置
[database]
# 使用 SQLite 作为默认数据库（无需额外安装MySQL）
type = sqlite
sqlite_path = data/products.db

# 爬虫配置
[crawler]
max_concurrent = 3
request_delay = 2
max_retries = 3

# 采集配置
[scraping]
categories = 手机数码,笔记本电脑,耳机音箱,智能手表
items_per_category = 50
platforms = jd,tmall
fields = title,price,sales,shop_name,platform,category,image_url,product_url,ratings,comments

# 京东官方API配置
[jd_api]
enabled = false
base_url = https://api.jd.com/routerjson
app_key = 
app_secret = 
access_token = 
method = jd.union.open.goods.jsearch
version = 2.0
sign_method = md5
response_path = jd_union_open_goods_jsearch_res.data
# 额外参数，多个参数用分号分隔，例如 adzone_id=12345;union_id=67890
extra_params = adzone_id=
timeout = 30

# 天猫/淘宝官方API配置
[tmall_api]
enabled = false
base_url = https://eco.taobao.com/router/rest
app_key = 
app_secret = 
access_token = 
method = taobao.tbk.dg.material.optional
version = 2.0
sign_method = md5
response_path = tbk_dg_material_optional_response.result_list.map_data
extra_params = adzone_id=
timeout = 30

# 定时任务配置
[scheduler]
enabled = true
interval_hours = 6
startup_delay = 5

# 日志配置
[logging]
level = INFO
log_file = logs/crawler.log
max_bytes = 10485760
backup_count = 5

# Dashboard配置
[dashboard]
port = 8501
host = 0.0.0.0

# API配置
[api]
port = 8000
host = 0.0.0.0
